<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | SRI RATHNA STORES</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>

    <nav class="main-nav"></nav>

    <main class="container" style="display: flex; align-items: center; justify-content: center; min-height: 80vh;">
        <div class="glass animate-fade" style="padding: 3rem; width: 100%; max-width: 450px; text-align: center;">
            <h2 style="margin-bottom: 0.5rem;">Create Account</h2>
            <p style="color: var(--text-muted); margin-bottom: 2rem;">Join our community and shop on credit</p>

            <div class="form-group" style="text-align: left;">
                <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem;">Full Name</label>
                <input type="text" id="name" placeholder="John Doe">
            </div>
            <div class="form-group" style="text-align: left;">
                <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem;">Username</label>
                <input type="text" id="u" placeholder="choose_username">
            </div>
            <div class="form-group" style="text-align: left;">
                <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem;">Password</label>
                <input type="password" id="p" placeholder="••••••••">
            </div>

            <button onclick="handleRegister()" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign
                Up</button>

            <p style="margin-top: 2rem; font-size: 0.9rem; color: var(--text-muted);">
                Already have an account? <a href="login.html"
                    style="color: var(--primary); text-decoration: none;">Login here</a>
            </p>
        </div>
    </main>

    <script>
        async function handleRegister() {
            const username = document.getElementById('u').value;
            const password = document.getElementById('p').value;
            const name = document.getElementById('name').value;

            if (!username || !password || !name) {
                UI.showToast("Please fill all fields", "warning");
                return;
            }

            // Mock registration - assuming backend supports /register or similar
            const data = await Api.post('/register', { username, password, name, role: 'user' });

            if (data) {
                UI.showToast("Registration Successful! Please login.");
                setTimeout(() => { location.href = "login.html"; }, 1500);
            } else {
                UI.showToast("Registration failed", "danger");
            }
        }
    </script>

</body>

</html>
