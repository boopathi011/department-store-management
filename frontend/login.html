<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | SRI RATHNA STORES</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>

<body>

  <nav class="main-nav"></nav>

  <main class="container" style="display: flex; align-items: center; justify-content: center; min-height: 80vh;">
    <div class="glass animate-fade" style="padding: 3rem; width: 100%; max-width: 400px; text-align: center;">
      <h2 style="margin-bottom: 0.5rem;">Welcome Back</h2>
      <p style="color: var(--text-muted); margin-bottom: 2rem;">Login to manage your orders</p>

      <div class="form-group" style="text-align: left;">
        <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem;">Username</label>
        <input type="text" id="u" placeholder="Enter username">
      </div>
      <div class="form-group" style="text-align: left;">
        <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem;">Password</label>
        <input type="password" id="p" placeholder="••••••••">
      </div>

      <button onclick="handleLogin()" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign In</button>

      <p style="margin-top: 2rem; font-size: 0.9rem; color: var(--text-muted);">
        Don't have an account? <a href="register.html" style="color: var(--primary); text-decoration: none;">Register
          here</a>
      </p>
    </div>
  </main>

  <script>
    async function handleLogin() {
      const username = document.getElementById('u').value;
      const password = document.getElementById('p').value;

      if (!username || !password) {
        UI.showToast("Please fill all fields", "warning");
        return;
      }

      const data = await Api.post('/login', { username, password });

      if (data) {
        Auth.setUser(data);
        UI.showToast("Login Successful!");
        setTimeout(() => {
          location.href = data.role === "admin" ? "admin.html" : "user.html";
        }, 1000);
      } else {
        UI.showToast("Invalid credentials", "danger");
      }
    }
  </script>

</body>

</html>
